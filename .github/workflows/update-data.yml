name: Update Market Data

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:        # manual trigger button in GitHub UI

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch market data and write data.json
        run: |
          python3 - <<'EOF'
          import urllib.request, json, csv, io, os

          result = {
            "timestamp": "",
            "vix": None, "ftse_price": None, "sma200": None, "fng": None,
            "yield_curve": None, "real_rate": None, "margin_debt": None,
            "buffett": None,      # Buffett Indicator: Wilshire5000 / GDP * 100 (%)
            # Market Conditions Score Engine - 6 FRED-Serien
            "unrate": None, "icsa": None, "hys": None,
            "fedfunds": None, "eurusd": None, "umcsent": None
          }

          from datetime import datetime, timezone
          result["timestamp"] = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")

          FRED_KEY = os.environ.get("FRED_API_KEY", "")

          # ── Hilfsfunktion: FRED-API abrufen ─────────────────────
          def fetch_fred(series_id):
              if not FRED_KEY:
                  raise ValueError("FRED_API_KEY nicht gesetzt")
              url = (f"https://api.stlouisfed.org/fred/series/observations"
                     f"?series_id={series_id}&api_key={FRED_KEY}"
                     f"&file_type=json&sort_order=desc&limit=36")
              req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
              with urllib.request.urlopen(req, timeout=15) as r:
                  data = json.loads(r.read())
              for obs in data["observations"]:
                  v = obs.get("value", ".")
                  if v and v != ".":
                      return float(v)
              raise ValueError(f"Kein gueltiger Wert fuer {series_id}")

          # --- VIX via CBOE ---
          try:
              url = "https://cdn.cboe.com/api/global/delayed_quotes/charts/historical/_VIX.json"
              req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
              with urllib.request.urlopen(req, timeout=10) as r:
                  data = json.loads(r.read())
              entries = data["data"]
              result["vix"] = float(entries[-1]["close"])
              print(f"VIX: {result['vix']}")
          except Exception as e:
              print(f"VIX error: {e}")

          # --- FTSE / VWCE via Stooq ---
          try:
              url = "https://stooq.com/q/d/l/?s=vwce.de&i=d"
              req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
              with urllib.request.urlopen(req, timeout=10) as r:
                  raw = r.read().decode("utf-8")
              reader = csv.reader(io.StringIO(raw))
              next(reader)  # skip header
              rows = [row for row in reader if row and len(row) >= 5]
              closes = [float(row[4]) for row in rows if row[4] not in ("", "null")]
              result["ftse_price"] = closes[-1]
              last200 = closes[-200:]
              result["sma200"] = round(sum(last200) / len(last200), 4)
              print(f"FTSE: {result['ftse_price']}  SMA200: {result['sma200']}")
          except Exception as e:
              print(f"FTSE error: {e}")

          # --- Fear & Greed (CNN) ---
          try:
              url = "https://production.dataviz.cnn.io/index/fearandgreed/graphdata"
              req = urllib.request.Request(url, headers={
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36",
                  "Accept": "application/json, text/plain, */*",
                  "Accept-Language": "en-US,en;q=0.9",
                  "Referer": "https://edition.cnn.com/markets/fear-and-greed",
                  "Origin": "https://edition.cnn.com",
              })
              with urllib.request.urlopen(req, timeout=10) as r:
                  data = json.loads(r.read())
              result["fng"] = float(data["fear_and_greed"]["score"])
              print(f"F&G (CNN): {result['fng']}")
          except Exception as e:
              print(f"F&G CNN error: {e}")

          # ── FRED: Zinskurve (10J - 2J Spread) ──────────────────
          # T10Y2Y: positiv = gesund, negativ = Rezessionswarnung
          try:
              result["yield_curve"] = round(fetch_fred("T10Y2Y"), 4)
              print(f"Zinskurve (T10Y2Y): {result['yield_curve']}")
          except Exception as e:
              print(f"FRED Zinskurve error: {e}")

          # ── FRED: Realzins 10J inflationsbereinigt ──────────────
          # DFII10: < 0% = günstig für Aktien, > 2% = starker Gegenwind
          try:
              result["real_rate"] = round(fetch_fred("DFII10"), 4)
              print(f"Realzins (DFII10): {result['real_rate']}")
          except Exception as e:
              print(f"FRED Realzins error: {e}")

          # ── FRED: Margin Debt (Mrd. USD) ────────────────────────
          # BOGZ1FL663067003Q: Quartalsweise in Millionen USD
          try:
              margin_millions = fetch_fred("BOGZ1FL663067003Q")
              result["margin_debt"] = round(margin_millions / 1000, 1)  # → Mrd. USD
              print(f"Margin Debt (FRED): ${result['margin_debt']}B")
          except Exception as e:
              print(f"FRED Margin Debt error: {e}")

          # ── FRED: Arbeitslosenquote (UNRATE) ────────────────────
          try:
              result["unrate"] = round(fetch_fred("UNRATE"), 2)
              print(f"Unemployment: {result['unrate']}%")
          except Exception as e:
              print(f"FRED UNRATE error: {e}")

          # ── FRED: Initial Jobless Claims 4-Wochen-Avg (ICSA) ────
          try:
              url_icsa = (f"https://api.stlouisfed.org/fred/series/observations"
                          f"?series_id=ICSA&api_key={FRED_KEY}"
                          f"&file_type=json&sort_order=desc&limit=5")
              req = urllib.request.Request(url_icsa, headers={"User-Agent": "Mozilla/5.0"})
              with urllib.request.urlopen(req, timeout=15) as r:
                  icsa_data = json.loads(r.read())
              icsa_vals = [float(o["value"]) for o in icsa_data["observations"] if o.get("value",".")!="."]
              if icsa_vals:
                  result["icsa"] = round(sum(icsa_vals[:4]) / min(4, len(icsa_vals)))
              print(f"Initial Claims (4w avg): {result['icsa']:,.0f}")
          except Exception as e:
              print(f"FRED ICSA error: {e}")

          # ── FRED: High-Yield OAS Spread (BAMLH0A0HYM2) ──────────
          try:
              result["hys"] = round(fetch_fred("BAMLH0A0HYM2"), 3)
              print(f"HY Spread: {result['hys']}%")
          except Exception as e:
              print(f"FRED HYS error: {e}")

          # ── FRED: Federal Funds Rate (FEDFUNDS) ──────────────────
          try:
              result["fedfunds"] = round(fetch_fred("FEDFUNDS"), 4)
              print(f"Fed Funds: {result['fedfunds']}%")
          except Exception as e:
              print(f"FRED FEDFUNDS error: {e}")

          # ── FRED: EUR/USD Wechselkurs (DEXUSEU) ──────────────────
          try:
              result["eurusd"] = round(fetch_fred("DEXUSEU"), 4)
              print(f"EUR/USD: {result['eurusd']}")
          except Exception as e:
              print(f"FRED EURUSD error: {e}")

          # ── FRED: Univ. Michigan Consumer Sentiment (UMCSENT) ────
          try:
              result["umcsent"] = round(fetch_fred("UMCSENT"), 1)
              print(f"Consumer Sentiment: {result['umcsent']}")
          except Exception as e:
              print(f"FRED UMCSENT error: {e}")

          # ── FRED: Buffett-Indikator = Wilshire5000 / BIP * 100 ──────────
          # WILL5000IND: Wilshire 5000 Total Market Index (Wochentlich)
          # GDP: Nominales BIP USA in Mrd. USD (quartalsweise)
          # Buffett-Indikator = (Index-Level / GDP * Skalierungsfaktor) * 100
          # Hinweis: WILL5000IND Level 50,000 ≈ $50T Marktkapitalisierung
          # GDP 28,000 Mrd. -> Buffett = (50,000 / 28,000) * 100 = 179%
          try:
              will = None
              for sid in ["WILL5000IND", "WILL5000INDFC", "WILL5000PRFC"]:
                  try:
                      will = fetch_fred(sid)
                      if will:
                          print(f"Wilshire via {sid}: {will}")
                          break
                  except Exception:
                      pass
              gdp = fetch_fred("GDP")
              if will and gdp and gdp > 0:
                  result["buffett"] = round((will / gdp) * 100, 1)
              print(f"Buffett Indicator: {result['buffett']}% (Wilshire/GDP)")
          except Exception as e:
              print(f"FRED Buffett error: {e}")

          with open("data.json", "w") as f:
              json.dump(result, f, indent=2)
          print("data.json written:", json.dumps(result))
          EOF

      - name: Commit and push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "chore: update market data [skip ci]"
          git push
