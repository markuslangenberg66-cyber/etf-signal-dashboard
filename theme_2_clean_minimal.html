<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Design 2: Clean Minimal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex items-center justify-center p-6">
    
    <!-- Haupt-Karte -->
    <div class="bg-white rounded-[2rem] p-8 w-full max-w-md shadow-[0_20px_50px_-12px_rgba(0,0,0,0.05)] border border-slate-100">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-lg font-semibold text-slate-500">FTSE All-World</h2>
            <span class="bg-emerald-100 text-emerald-700 text-xs font-bold px-3 py-1 rounded-full">Live Börse</span>
        </div>
        
        <div class="text-5xl font-bold text-slate-900 tracking-tight mb-2">124.50 €</div>
        
        <div class="text-emerald-500 flex items-center font-medium mb-8">
            <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
            +1.2% Heute
        </div>
        
        <button class="w-full bg-slate-900 hover:bg-slate-800 text-white font-medium text-lg py-4 px-4 rounded-2xl transition duration-200">
            Kaufsignal Aktiv
        </button>
    </div>

</body>
</html>
