<!DOCTYPE html>

<body class="bg-black text-cyan-400 min-h-screen flex items-center justify-center p-6 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI4IiBoZWlnaHQ9IjgiPgo8cmVjdCB3aWR0aD0iOCIgaGVpZ2h0PSI4IiBmaWxsPSIjMDAwIj48L3JlY3Q+CjxwYXRoIGQ9Ik0wLDRMODQsMCBNNCw4TDgsNCIgc3Ryb2tlPSIjMTExIiBzdHJva2Utd2lkdGg9IjEiPjwvcGF0aD4KPC9zdmc+')]">
    
    <!-- Cyberpunk Card -->
    <div class="bg-gray-900 border-2 border-pink-500 p-8 w-full max-w-md shadow-[0_0_20px_rgba(236,72,153,0.5)] relative overflow-hidden">
        <!-- Laser-Linie oben -->
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-pink-500 to-cyan-400"></div>
        
        <div class="flex justify-between items-center mb-6 mt-2">
            <h2 class="text-lg font-bold tracking-widest text-pink-500 uppercase">SYS.FTSE_WORLD</h2>
            <span class="bg-cyan-900/50 text-cyan-300 text-xs font-bold px-3 py-1 border border-cyan-400">ONLINE</span>
        </div>
        
        <div class="text-5xl font-bold text-white mb-2 drop-shadow-[0_0_8px_rgba(255,255,255,0.8)]">124.50 EUR</div>
        
        <div class="text-lime-400 flex items-center font-bold mb-8">
            <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
            +1.2% // HEUTE
        </div>
        
        <button class="w-full bg-transparent hover:bg-pink-500 text-pink-500 hover:text-black border-2 border-pink-500 font-bold text-lg py-4 px-4 transition duration-200 uppercase tracking-widest shadow-[0_0_10px_rgba(236,72,153,0.3)] hover:shadow-[0_0_20px_rgba(236,72,153,0.8)]">
            Kaufsignal [Aktiv]
