<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Design 6: Neo-Brutalism</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Zetta:wght@400;700;900&display=swap" rel="stylesheet">
    <style> body { font-family: 'Lexend Zetta', sans-serif; } </style>
</head>
<body class="bg-yellow-400 text-black min-h-screen flex items-center justify-center p-6">
    
    <!-- Neo-Brutalism Karte -->
    <div class="bg-white border-4 border-black p-8 w-full max-w-md shadow-[10px_10px_0px_rgba(0,0,0,1)] hover:-translate-y-1 hover:-translate-x-1 hover:shadow-[15px_15px_0px_rgba(0,0,0,1)] transition-all duration-200">
        <div class="flex justify-between items-center border-b-4 border-black pb-4 mb-6">
            <h2 class="text-sm font-black uppercase">FTSE All-World</h2>
            <span class="bg-blue-400 text-black text-xs font-black uppercase px-2 py-1 border-2 border-black shadow-[3px_3px_0px_rgba(0,0,0,1)]">LIVE</span>
        </div>
        
        <div class="text-4xl font-black mb-2 mt-4">124.50 €</div>
        
        <div class="bg-green-400 text-black inline-flex items-center font-black px-3 py-1 border-2 border-black mb-8 shadow-[4px_4px_0px_rgba(0,0,0,1)]">
            <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
            + 1.2% HEUTE
        </div>
        
        <button class="w-full block bg-purple-400 hover:bg-pink-400 text-white font-black uppercase text-lg py-5 px-4 border-4 border-black text-center transition duration-200 shadow-[6px_6px_0px_rgba(0,0,0,1)] active:shadow-none active:translate-x-[6px] active:translate-y-[6px]">
            Kaufsignal Aktiv
        </button>
    </div>

</body>
</html>
